<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Nexus - Attendance</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-layer-group" style="color: var(--secondary-color); margin-right: 12px;"></i>
                HR Nexus
            </div>
            <ul class="sidebar-menu">
                <li><a href="admin-dashboard.html"><i class="fas fa-home"></i> Dashboard</a></li>
                <li><a href="employees.html"><i class="fas fa-users"></i> Employees</a></li>
                <li><a href="departments.html"><i class="fas fa-building"></i> Departments</a></li>
                <li><a href="attendance.html" class="active"><i class="fas fa-clock"></i> Attendance</a></li>
                <li><a href="leaves.html"><i class="fas fa-calendar-alt"></i> Leave Management</a></li>
                <li><a href="payroll.html"><i class="fas fa-money-check-alt"></i> Payroll</a></li>
                <li><a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <div class="search-bar"></div>
                <div class="user-profile">Admin User</div>
            </header>

            <div class="content-area">
                <div class="page-header">
                    <h1 class="page-title">Attendance Register</h1>
                    <div>
                        <button class="btn" style="width: auto; background: var(--secondary-color);" onclick="checkIn()"><i class="fas fa-sign-in-alt"></i> Check In</button>
                        <button class="btn" style="width: auto; background: var(--danger-color);" onclick="checkOut()"><i class="fas fa-sign-out-alt"></i> Check Out</button>
                    </div>
                </div>

                <div class="table-card">
                    <table id="attTable">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Employee</th>
                                <th>Check In</th>
                                <th>Check Out</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="attTableBody">
                            <tr><td colspan="5" style="text-align: center;">Loading attendance...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', loadAttendance);

        function loadAttendance() {
            fetch(`${API_URL}/attendance`, { headers: getAuthHeaders() })
            .then(res => res.json())
            .then(data => {
                const tbody = document.getElementById('attTableBody');
                tbody.innerHTML = '';
                if(data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align: center;">No attendance records found</td></tr>';
                    return;
                }
                data.forEach(att => {
                    tbody.innerHTML += `
                        <tr>
                            <td>${att.date}</td>
                            <td style="font-weight: 500;">${att.user ? att.user.firstName + ' ' + att.user.lastName : 'Unknown'}</td>
                            <td>${att.checkInTime || '-'}</td>
                            <td>${att.checkOutTime || '-'}</td>
                            <td><span class="badge ${att.status === 'PRESENT' ? 'active' : 'inactive'}">${att.status || 'PRESENT'}</span></td>
                        </tr>
                    `;
                });
            })
            .catch(err => console.error('Error fetching attendance:', err));
        }

        function checkIn() {
            fetch(`${API_URL}/attendance/check-in`, { method: 'POST', headers: getAuthHeaders() })
            .then(() => { alert('Checked in successfully!'); loadAttendance(); })
            .catch(err => alert('Error checking in'));
        }

        function checkOut() {
            fetch(`${API_URL}/attendance/check-out`, { method: 'POST', headers: getAuthHeaders() })
            .then(() => { alert('Checked out successfully!'); loadAttendance(); })
            .catch(err => alert('Error checking out. Did you check in?'));
        }
    </script>
</body>
</html>
