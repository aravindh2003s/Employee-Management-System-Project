<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Nexus - Departments</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-layer-group" style="color: var(--secondary-color); margin-right: 12px;"></i>
                HR Nexus
            </div>
            <ul class="sidebar-menu">
                <li><a href="admin-dashboard.html"><i class="fas fa-home"></i> Dashboard</a></li>
                <li><a href="employees.html"><i class="fas fa-users"></i> Employees</a></li>
                <li><a href="departments.html" class="active"><i class="fas fa-building"></i> Departments</a></li>
                <li><a href="attendance.html"><i class="fas fa-clock"></i> Attendance</a></li>
                <li><a href="leaves.html"><i class="fas fa-calendar-alt"></i> Leave Management</a></li>
                <li><a href="payroll.html"><i class="fas fa-money-check-alt"></i> Payroll</a></li>
                <li><a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <div class="search-bar"></div>
                <div class="user-profile">Admin User</div>
            </header>

            <div class="content-area">
                <div class="page-header">
                    <h1 class="page-title">Departments</h1>
                    <div>
                        <button class="btn" style="width: auto;"><i class="fas fa-plus"></i> Add Department</button>
                    </div>
                </div>

                <div class="table-card" style="margin-bottom: 2rem;">
                    <table id="deptTable">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Department Name</th>
                                <th>Description</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="deptTableBody">
                            <tr><td colspan="4" style="text-align: center;">Loading departments...</td></tr>
                        </tbody>
                    </table>
                </div>

                <div class="page-header" id="empHeader" style="display: none;">
                    <h2 class="page-title" id="empTitle">Employees in Department</h2>
                </div>

                <div class="table-card" id="empCard" style="display: none;">
                    <table id="empTable">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Designation</th>
                            </tr>
                        </thead>
                        <tbody id="empTableBody">
                            <tr><td colspan="4" style="text-align: center;">Loading employees...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            fetch(`${API_URL}/departments`, { headers: getAuthHeaders() })
            .then(res => res.json())
            .then(data => {
                const tbody = document.getElementById('deptTableBody');
                tbody.innerHTML = '';
                if(data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" style="text-align: center;">No departments found</td></tr>';
                    return;
                }
                data.forEach(dept => {
                    tbody.innerHTML += `
                        <tr>
                            <td>${dept.id}</td>
                            <td style="font-weight: 500;">${dept.name}</td>
                            <td>${dept.description || '-'}</td>
                            <td>
                                <button onclick="viewEmployees('${dept.name}')" class="btn" style="width: auto; padding: 4px 10px; font-size: 12px; margin-right: 10px;"><i class="fas fa-users"></i> View Employees</button>
                                <button style="background:none; border:none; color: #3b82f6; cursor: pointer;"><i class="fas fa-edit"></i></button>
                            </td>
                        </tr>
                    `;
                });
            })
            .catch(err => console.error('Error fetching departments:', err));
        });

        function viewEmployees(deptName) {
            document.getElementById('empHeader').style.display = 'flex';
            document.getElementById('empCard').style.display = 'block';
            document.getElementById('empTitle').innerText = `Employees in ${deptName}`;
            
            const tbody = document.getElementById('empTableBody');
            tbody.innerHTML = '<tr><td colspan="4" style="text-align: center;">Loading employees...</td></tr>';

            fetch(`${API_URL}/employees`, { headers: getAuthHeaders() })
            .then(res => res.json())
            .then(data => {
                tbody.innerHTML = '';
                const filtered = data.filter(emp => emp.departmentName === deptName);
                
                if(filtered.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" style="text-align: center;">No employees found in this department</td></tr>';
                    return;
                }
                filtered.forEach(emp => {
                    tbody.innerHTML += `
                        <tr>
                            <td>${emp.employeeId}</td>
                            <td style="font-weight: 500;">${emp.firstName} ${emp.lastName}</td>
                            <td>${emp.email}</td>
                            <td>${emp.designation || '-'}</td>
                        </tr>
                    `;
                });
            })
            .catch(err => console.error('Error fetching employees:', err));
        }
    </script>
</body>
</html>
