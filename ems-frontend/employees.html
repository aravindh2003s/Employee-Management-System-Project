<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Nexus - Employees</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-layer-group" style="color: var(--secondary-color); margin-right: 12px;"></i>
                HR Nexus
            </div>
            <ul class="sidebar-menu">
                <li><a href="admin-dashboard.html"><i class="fas fa-home"></i> Dashboard</a></li>
                <li><a href="employees.html" class="active"><i class="fas fa-users"></i> Employees</a></li>
                <li><a href="departments.html"><i class="fas fa-building"></i> Departments</a></li>
                <li><a href="attendance.html"><i class="fas fa-clock"></i> Attendance</a></li>
                <li><a href="leaves.html"><i class="fas fa-calendar-alt"></i> Leave Management</a></li>
                <li><a href="payroll.html"><i class="fas fa-money-check-alt"></i> Payroll</a></li>
                <li><a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Header -->
            <header class="top-header">
                <div class="search-bar">
                    <input type="text" placeholder="Search employees..." style="border: 1px solid #ddd; padding: 8px; border-radius: 4px; width: 300px;">
                </div>
                <div class="user-profile">
                    Admin User
                </div>
            </header>

            <div class="content-area">
                <div class="page-header">
                    <h1 class="page-title">Employee Directory</h1>
                    <div>
                        <button class="btn" style="width: auto; background: white; color: #333; border: 1px solid #ddd; margin-right: 10px;"><i class="fas fa-file-export"></i> Export</button>
                        <button class="btn" style="width: auto;"><i class="fas fa-plus"></i> Add Employee</button>
                    </div>
                </div>

                <div class="table-card">
                    <div class="table-header">
                        <div style="display: flex; gap: 15px;">
                            <select style="padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
                                <option>All Departments</option>
                                <option>Engineering</option>
                                <option>HR</option>
                            </select>
                            <select style="padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
                                <option>All Status</option>
                                <option>Active</option>
                                <option>Inactive</option>
                            </select>
                        </div>
                    </div>
                    <table id="employeeTable">
                        <thead>
                            <tr>
                                <th>Emp ID</th>
                                <th>Name</th>
                                <th>Department</th>
                                <th>Designation</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="employeeTableBody">
                            <!-- Populated by JS -->
                            <tr>
                                <td colspan="6" style="text-align: center; padding: 30px;">Loading employees...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            fetch(`${API_URL}/employees`, {
                headers: getAuthHeaders()
            })
            .then(res => res.json())
            .then(data => {
                const tbody = document.getElementById('employeeTableBody');
                tbody.innerHTML = '';
                if(data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align: center;">No employees found</td></tr>';
                    return;
                }
                data.forEach(emp => {
                    const statusBadge = emp.isActive ? '<span class="badge active">Active</span>' : '<span class="badge inactive">Inactive</span>';
                    tbody.innerHTML += `
                        <tr>
                            <td>${emp.employeeId || 'N/A'}</td>
                            <td>
                                <div style="display: flex; align-items: center; gap: 10px;">
                                    <img src="https://ui-avatars.com/api/?name=${emp.firstName}+${emp.lastName}" style="width: 32px; border-radius: 50%;">
                                    <div>
                                        <div style="font-weight: 500;">${emp.firstName} ${emp.lastName}</div>
                                        <div style="font-size: 12px; color: #64748b;">${emp.email}</div>
                                    </div>
                                </div>
                            </td>
                            <td>${emp.departmentName || 'N/A'}</td>
                            <td>${emp.designation || 'N/A'}</td>
                            <td>${statusBadge}</td>
                            <td>
                                <button style="background:none; border:none; color: #3b82f6; cursor: pointer; margin-right: 10px;"><i class="fas fa-edit"></i></button>
                                <button style="background:none; border:none; color: #ef4444; cursor: pointer;"><i class="fas fa-trash"></i></button>
                            </td>
                        </tr>
                    `;
                });
            })
            .catch(err => console.error('Error fetching employees:', err));
        });
    </script>
</body>
</html>
