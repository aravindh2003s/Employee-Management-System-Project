<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Nexus - Payroll</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <div class="brand-logo">
                <div class="brand-icon"></div>
                <span>HR Nexus</span>
            </div>
            <ul class="nav-menu">
                <li><a href="admin-dashboard.html" class="nav-item"><i class="fa-solid fa-border-all"></i> Dashboard</a></li>
                <li><a href="employees.html" class="nav-item "><i class="fa-solid fa-users"></i> Employees</a></li>
                <li><a href="departments.html" class="nav-item "><i class="fa-solid fa-sitemap"></i> Departments</a></li>
                <li><a href="attendance.html" class="nav-item "><i class="fa-regular fa-clock"></i> Attendance</a></li>
                <li><a href="leaves.html" class="nav-item "><i class="fa-regular fa-calendar-check"></i> Leave</a></li>
                <li><a href="payroll.html" class="nav-item active"><i class="fa-solid fa-wallet"></i> Payroll</a></li>
                <li><a href="#" class="nav-item"><i class="fa-solid fa-chart-line"></i> Reports</a></li>
                <li><a href="#" class="nav-item"><i class="fa-regular fa-bell"></i> Notifications</a></li>
                <li style="margin-top: auto;"><a href="#" class="nav-item" onclick="logout()"><i class="fa-solid fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </aside>
        <main class="main-content">
            <header class="top-header">
                <div class="search-container">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" class="search-input" placeholder="Search...">
                </div>
                <div class="header-actions">
                    <div class="icon-btn"><i class="fa-regular fa-bell"></i></div>
                    <div class="theme-toggle">
                        <div class="theme-btn"><i class="fa-regular fa-sun"></i></div>
                        <div class="theme-btn active"><i class="fa-regular fa-moon"></i></div>
                    </div>
                    <span class="date-display">Aug 26, 2023</span>
                    <div class="user-profile">
                        <img src="https://i.pravatar.cc/150?u=a042581f4e29026704d" alt="Profile">
                    </div>
                </div>
            </header>
            <div class="dashboard-scroll">

                <div class="page-header">
                    <h1 class="page-title">Payroll Management</h1>
                    <div>
                        <button class="btn btn-primary" style="width: auto;" onclick="generatePayroll()"><i class="fas fa-file-invoice-dollar"></i> Generate Payroll</button>
                    </div>
                </div>

                <div class="table-card">
                    <table id="payrollTable">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Employee</th>
                                <th>Period</th>
                                <th>Net Salary</th>
                                <th>Status</th>
                                <th>Payment Date</th>
                            </tr>
                        </thead>
                        <tbody id="payrollTableBody">
                            <tr><td colspan="6" style="text-align: center;">Loading payroll...</td></tr>
                        </tbody>
                    </table>
                </div>
            
            </div>
        </main>
    </div>
<script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', loadPayroll);

        function loadPayroll() {
            fetch(`${API_URL}/payroll`, { headers: getAuthHeaders() })
            .then(res => res.json())
            .then(data => {
                const tbody = document.getElementById('payrollTableBody');
                tbody.innerHTML = '';
                if(data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align: center;">No payroll records found</td></tr>';
                    return;
                }
                data.forEach(pay => {
                    tbody.innerHTML += `
                        <tr>
                            <td>#PRL-${pay.id}</td>
                            <td style="font-weight: 500;">${pay.user ? pay.user.firstName + ' ' + pay.user.lastName : 'Unknown'}</td>
                            <td>${pay.month}/${pay.year}</td>
                            <td style="font-weight: 600; color: #10b981;">$${pay.netSalary}</td>
                            <td><span class="badge active">${pay.status}</span></td>
                            <td>${pay.paymentDate}</td>
                        </tr>
                    `;
                });
            })
            .catch(err => console.error('Error fetching payroll:', err));
        }

        function generatePayroll() {
            // Generating a dummy payroll for user 2 (employee) for demo purposes
            const req = {
                userId: 2,
                month: new Date().getMonth() + 1,
                year: new Date().getFullYear(),
                bonus: 500.0,
                deductions: 100.0
            };
            fetch(`${API_URL}/payroll/generate`, {
                method: 'POST',
                headers: getAuthHeaders(),
                body: JSON.stringify(req)
            })
            .then(() => { alert("Payroll generated!"); loadPayroll(); })
            .catch(() => alert("Failed to generate payroll. Ensure employee exists."));
        }
    </script>
<script src="js/theme.js"></script>
</body>
</html>
