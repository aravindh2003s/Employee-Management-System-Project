<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Nexus - Payroll</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-layer-group" style="color: var(--secondary-color); margin-right: 12px;"></i>
                HR Nexus
            </div>
            <ul class="sidebar-menu">
                <li><a href="admin-dashboard.html"><i class="fas fa-home"></i> Dashboard</a></li>
                <li><a href="employees.html"><i class="fas fa-users"></i> Employees</a></li>
                <li><a href="departments.html"><i class="fas fa-building"></i> Departments</a></li>
                <li><a href="attendance.html"><i class="fas fa-clock"></i> Attendance</a></li>
                <li><a href="leaves.html"><i class="fas fa-calendar-alt"></i> Leave Management</a></li>
                <li><a href="payroll.html" class="active"><i class="fas fa-money-check-alt"></i> Payroll</a></li>
                <li><a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <div class="search-bar"></div>
                <div class="user-profile">Admin User</div>
            </header>

            <div class="content-area">
                <div class="page-header">
                    <h1 class="page-title">Payroll Management</h1>
                    <div>
                        <button class="btn" style="width: auto;" onclick="generatePayroll()"><i class="fas fa-file-invoice-dollar"></i> Generate Payroll</button>
                    </div>
                </div>

                <div class="table-card">
                    <table id="payrollTable">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Employee</th>
                                <th>Period</th>
                                <th>Net Salary</th>
                                <th>Status</th>
                                <th>Payment Date</th>
                            </tr>
                        </thead>
                        <tbody id="payrollTableBody">
                            <tr><td colspan="6" style="text-align: center;">Loading payroll...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', loadPayroll);

        function loadPayroll() {
            fetch(`${API_URL}/payroll`, { headers: getAuthHeaders() })
            .then(res => res.json())
            .then(data => {
                const tbody = document.getElementById('payrollTableBody');
                tbody.innerHTML = '';
                if(data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align: center;">No payroll records found</td></tr>';
                    return;
                }
                data.forEach(pay => {
                    tbody.innerHTML += `
                        <tr>
                            <td>#PRL-${pay.id}</td>
                            <td style="font-weight: 500;">${pay.user ? pay.user.firstName + ' ' + pay.user.lastName : 'Unknown'}</td>
                            <td>${pay.month}/${pay.year}</td>
                            <td style="font-weight: 600; color: #10b981;">$${pay.netSalary}</td>
                            <td><span class="badge active">${pay.status}</span></td>
                            <td>${pay.paymentDate}</td>
                        </tr>
                    `;
                });
            })
            .catch(err => console.error('Error fetching payroll:', err));
        }

        function generatePayroll() {
            // Generating a dummy payroll for user 2 (employee) for demo purposes
            const req = {
                userId: 2,
                month: new Date().getMonth() + 1,
                year: new Date().getFullYear(),
                bonus: 500.0,
                deductions: 100.0
            };
            fetch(`${API_URL}/payroll/generate`, {
                method: 'POST',
                headers: getAuthHeaders(),
                body: JSON.stringify(req)
            })
            .then(() => { alert("Payroll generated!"); loadPayroll(); })
            .catch(() => alert("Failed to generate payroll. Ensure employee exists."));
        }
    </script>
</body>
</html>
