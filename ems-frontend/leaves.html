<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Nexus - Leave Management</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <div class="brand-logo">
                <div class="brand-icon"></div>
                <span>HR Nexus</span>
            </div>
            <ul class="nav-menu">
                <li><a href="admin-dashboard.html" class="nav-item"><i class="fa-solid fa-border-all"></i> Dashboard</a></li>
                <li><a href="employees.html" class="nav-item "><i class="fa-solid fa-users"></i> Employees</a></li>
                <li><a href="departments.html" class="nav-item "><i class="fa-solid fa-sitemap"></i> Departments</a></li>
                <li><a href="attendance.html" class="nav-item "><i class="fa-regular fa-clock"></i> Attendance</a></li>
                <li><a href="leaves.html" class="nav-item active"><i class="fa-regular fa-calendar-check"></i> Leave</a></li>
                <li><a href="payroll.html" class="nav-item "><i class="fa-solid fa-wallet"></i> Payroll</a></li>
                <li><a href="#" class="nav-item"><i class="fa-solid fa-chart-line"></i> Reports</a></li>
                <li><a href="#" class="nav-item"><i class="fa-regular fa-bell"></i> Notifications</a></li>
                <li style="margin-top: auto;"><a href="#" class="nav-item" onclick="logout()"><i class="fa-solid fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </aside>
        <main class="main-content">
            <header class="top-header">
                <div class="search-container">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" class="search-input" placeholder="Search...">
                </div>
                <div class="header-actions">
                    <div class="icon-btn"><i class="fa-regular fa-bell"></i></div>
                    <div class="theme-toggle">
                        <div class="theme-btn"><i class="fa-regular fa-sun"></i></div>
                        <div class="theme-btn active"><i class="fa-regular fa-moon"></i></div>
                    </div>
                    <span class="date-display">Aug 26, 2023</span>
                    <div class="user-profile">
                        <img src="https://i.pravatar.cc/150?u=a042581f4e29026704d" alt="Profile">
                    </div>
                </div>
            </header>
            <div class="dashboard-scroll">

                <div class="page-header">
                    <h1 class="page-title">Leave Requests</h1>
                    <div>
                        <button class="btn btn-primary" style="width: auto;" onclick="applyLeave()"><i class="fas fa-paper-plane"></i> Apply Leave</button>
                    </div>
                </div>

                <div class="table-card">
                    <table id="leaveTable">
                        <thead>
                            <tr>
                                <th>Employee</th>
                                <th>Type</th>
                                <th>Duration</th>
                                <th>Reason</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="leaveTableBody">
                            <tr><td colspan="6" style="text-align: center;">Loading leaves...</td></tr>
                        </tbody>
                    </table>
                </div>
            
            </div>
        </main>
    </div>
<script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', loadLeaves);

        function loadLeaves() {
            fetch(`${API_URL}/leaves`, { headers: getAuthHeaders() })
            .then(res => res.json())
            .then(data => {
                const tbody = document.getElementById('leaveTableBody');
                tbody.innerHTML = '';
                if(data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align: center;">No leave requests found</td></tr>';
                    return;
                }
                data.forEach(leave => {
                    let badgeClass = leave.status === 'APPROVED' ? 'active' : (leave.status === 'REJECTED' ? 'inactive' : 'yellow');
                    tbody.innerHTML += `
                        <tr>
                            <td style="font-weight: 500;">${leave.user ? leave.user.firstName + ' ' + leave.user.lastName : 'Unknown'}</td>
                            <td>${leave.leaveType || 'Sick Leave'}</td>
                            <td>${leave.startDate} to ${leave.endDate}</td>
                            <td>${leave.reason}</td>
                            <td><span class="badge ${badgeClass}">${leave.status}</span></td>
                            <td>
                                ${leave.status === 'PENDING' ? `
                                <button onclick="updateStatus(${leave.id}, 'APPROVED')" style="background:none; border:none; color: #10b981; cursor: pointer; margin-right: 10px;"><i class="fas fa-check"></i></button>
                                <button onclick="updateStatus(${leave.id}, 'REJECTED')" style="background:none; border:none; color: #ef4444; cursor: pointer;"><i class="fas fa-times"></i></button>
                                ` : '-'}
                            </td>
                        </tr>
                    `;
                });
            })
            .catch(err => console.error('Error fetching leaves:', err));
        }

        function updateStatus(id, status) {
            fetch(`${API_URL}/leaves/${id}/status`, {
                method: 'PUT',
                headers: getAuthHeaders(),
                body: JSON.stringify({ status: status, adminRemarks: "Updated via admin panel" })
            })
            .then(() => loadLeaves());
        }

        function applyLeave() {
            const req = {
                startDate: new Date().toISOString().split('T')[0],
                endDate: new Date(Date.now() + 86400000).toISOString().split('T')[0],
                reason: "Not feeling well",
                leaveType: "SICK_LEAVE"
            };
            fetch(`${API_URL}/leaves/apply`, {
                method: 'POST',
                headers: getAuthHeaders(),
                body: JSON.stringify(req)
            })
            .then(() => { alert("Leave applied for testing!"); loadLeaves(); });
        }
    </script>
<script src="js/theme.js"></script>
</body>
</html>
