<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRMS - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <i class="fas fa-layer-group fa-3x" style="color: var(--secondary-color); margin-bottom: 15px;"></i>
                <h1>HR Nexus</h1>
                <p>Enterprise Employee Management System</p>
            </div>
            
            <form id="login-form">
                <div id="error-message" style="color: var(--danger-color); text-align: center; margin-bottom: 15px; font-size: 14px;"></div>
                
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="admin@hrnexus.com" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>
                
                <div class="form-group" style="display: flex; justify-content: space-between; align-items: center;">
                    <label style="display: flex; align-items: center; font-weight: normal;">
                        <input type="checkbox" style="margin-right: 8px;"> Remember Me
                    </label>
                    <a href="#" style="color: var(--secondary-color); font-size: 14px; text-decoration: none;">Forgot Password?</a>
                </div>
                
                <button type="submit" class="btn">Sign In to Dashboard</button>
            </form>
            
            <div class="auth-footer">
                <p>Having trouble logging in? <a href="#">Contact IT Support</a></p>
            </div>
        </div>
    </div>
    
    <script src="js/auth.js"></script>
</body>
</html>
