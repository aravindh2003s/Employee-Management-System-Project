<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Nexus - Attendance</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <div class="brand-logo">
                <div class="brand-icon"></div>
                <span>HR Nexus</span>
            </div>
            <ul class="nav-menu">
                <li><a href="admin-dashboard.html" class="nav-item"><i class="fa-solid fa-border-all"></i> Dashboard</a></li>
                <li><a href="employees.html" class="nav-item "><i class="fa-solid fa-users"></i> Employees</a></li>
                <li><a href="departments.html" class="nav-item "><i class="fa-solid fa-sitemap"></i> Departments</a></li>
                <li><a href="attendance.html" class="nav-item active"><i class="fa-regular fa-clock"></i> Attendance</a></li>
                <li><a href="leaves.html" class="nav-item "><i class="fa-regular fa-calendar-check"></i> Leave</a></li>
                <li><a href="payroll.html" class="nav-item "><i class="fa-solid fa-wallet"></i> Payroll</a></li>
                <li><a href="#" class="nav-item"><i class="fa-solid fa-chart-line"></i> Reports</a></li>
                <li><a href="#" class="nav-item"><i class="fa-regular fa-bell"></i> Notifications</a></li>
                <li style="margin-top: auto;"><a href="#" class="nav-item" onclick="logout()"><i class="fa-solid fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </aside>
        <main class="main-content">
            <header class="top-header">
                <div class="search-container">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" class="search-input" placeholder="Search...">
                </div>
                <div class="header-actions">
                    <div class="icon-btn"><i class="fa-regular fa-bell"></i></div>
                    <div class="theme-toggle">
                        <div class="theme-btn"><i class="fa-regular fa-sun"></i></div>
                        <div class="theme-btn active"><i class="fa-regular fa-moon"></i></div>
                    </div>
                    <span class="date-display">Aug 26, 2023</span>
                    <div class="user-profile">
                        <img src="https://i.pravatar.cc/150?u=a042581f4e29026704d" alt="Profile">
                    </div>
                </div>
            </header>
            <div class="dashboard-scroll">

                <div class="page-header">
                    <h1 class="page-title">Attendance Register</h1>
                    <div>
                        <button class="btn btn-primary" style="width: auto; background: var(--secondary-color);" onclick="checkIn()"><i class="fas fa-sign-in-alt"></i> Check In</button>
                        <button class="btn btn-primary" style="width: auto; background: var(--danger-color);" onclick="checkOut()"><i class="fas fa-sign-out-alt"></i> Check Out</button>
                    </div>
                </div>

                <div class="table-card">
                    <table id="attTable">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Employee</th>
                                <th>Check In</th>
                                <th>Check Out</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="attTableBody">
                            <tr><td colspan="5" style="text-align: center;">Loading attendance...</td></tr>
                        </tbody>
                    </table>
                </div>
            
            </div>
        </main>
    </div>
<script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', loadAttendance);

        function loadAttendance() {
            fetch(`${API_URL}/attendance`, { headers: getAuthHeaders() })
            .then(res => res.json())
            .then(data => {
                const tbody = document.getElementById('attTableBody');
                tbody.innerHTML = '';
                if(data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align: center;">No attendance records found</td></tr>';
                    return;
                }
                data.forEach(att => {
                    tbody.innerHTML += `
                        <tr>
                            <td>${att.date}</td>
                            <td style="font-weight: 500;">${att.user ? att.user.firstName + ' ' + att.user.lastName : 'Unknown'}</td>
                            <td>${att.checkInTime || '-'}</td>
                            <td>${att.checkOutTime || '-'}</td>
                            <td><span class="badge ${att.status === 'PRESENT' ? 'active' : 'inactive'}">${att.status || 'PRESENT'}</span></td>
                        </tr>
                    `;
                });
            })
            .catch(err => console.error('Error fetching attendance:', err));
        }

        function checkIn() {
            fetch(`${API_URL}/attendance/check-in`, { method: 'POST', headers: getAuthHeaders() })
            .then(() => { alert('Checked in successfully!'); loadAttendance(); })
            .catch(err => alert('Error checking in'));
        }

        function checkOut() {
            fetch(`${API_URL}/attendance/check-out`, { method: 'POST', headers: getAuthHeaders() })
            .then(() => { alert('Checked out successfully!'); loadAttendance(); })
            .catch(err => alert('Error checking out. Did you check in?'));
        }
    </script>
<script src="js/theme.js"></script>
</body>
</html>
